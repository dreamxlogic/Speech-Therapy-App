<!DOCTYPE html>
<html>
<head>
<title>Speech Therapy</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root{
  --ink:#3A3550;--ink-soft:#6A6488;--muted:#9A93B4;
  --pink:#EE7AA8;--violet:#B98AE0;--blue:#7FA9E6;--warm:#F6C76B;
  --grad:linear-gradient(90deg,#F6C76B,#EE7AA8 38%,#B98AE0 68%,#7FA9E6);
  --grad-d:linear-gradient(135deg,#EE7AA8,#B98AE0 55%,#7FA9E6);
  --grad-soft:linear-gradient(135deg,#FBE9F2,#EFEAFB 55%,#E8F0FB);
  --paper:#F4F1FA;--paper-2:rgba(255,255,255,.78);
  --teal:#8E7CD8;--teal-bright:#B98AE0;
  --coral:#E86FA6;--coral-soft:#FCE0EC;
  --plum:#8E7CD8;--plum-soft:#F1ECFB;
  --olive:#5C84CE;--olive-soft:#E7F0FB;
  --good:#7FA9E6;
  --mist:#EFEAFB;--sage:#E8F0FB;
  --line:rgba(150,130,200,.22);--line-soft:rgba(150,130,200,.13);
  --shadow:0 12px 30px rgba(150,130,200,.16);--r:22px;
}
*{box-sizing:border-box}
svg text,svg{font-family:'Nunito',system-ui,sans-serif}
html{scroll-behavior:smooth}
body{margin:0;background:radial-gradient(125% 90% at 80% -5%,#FBE9F2 0%,#EFEAFB 38%,#E8F0FB 70%,#F4F1FA 100%) fixed;color:var(--ink);font-family:'Nunito',system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;height:100dvh;overflow:hidden}

/* ---- tweak themes ---- */
html[data-vibe="vivid"]{--grad-d:linear-gradient(135deg,#FF5C9E,#A65CE8 55%,#5C8FF0);--grad:linear-gradient(90deg,#FFB24A,#FF5C9E 38%,#A65CE8 68%,#5C8FF0);--pink:#F0589C;--violet:#A65CE8}
html[data-vibe="mono"]{--grad-d:linear-gradient(135deg,#A99AEA,#8174CE);--grad:linear-gradient(90deg,#C3B7F0,#A99AEA 50%,#8174CE);--pink:#8E7CD8;--warm:#B0A4E6}
html[data-surface="solid"]{--paper-2:#ffffff}
html[data-surface="solid"] .card,html[data-surface="solid"] .tile,html[data-surface="solid"] .chartcard,html[data-surface="solid"] .xrow,html[data-surface="solid"] .tog,html[data-surface="solid"] .gamebox{backdrop-filter:none;-webkit-backdrop-filter:none;background:#fff;border-color:rgba(150,130,200,.16)}
html[data-surface="solid"] .tabbar{background:rgba(255,255,255,.97);backdrop-filter:none;-webkit-backdrop-filter:none}
html[data-wash="sunrise"] body{background:radial-gradient(125% 95% at 50% -8%,#FFE7D2 0%,#FCE2EC 28%,#EFEAFB 60%,#E8F0FB 100%) fixed}
html[data-wash="sky"] body{background:radial-gradient(125% 90% at 72% -5%,#E1EFFB 0%,#EAEAFB 42%,#F1ECFA 75%,#F4F1FA 100%) fixed}
/* corners */
html[data-corners="pillowy"]{--r:30px}
html[data-corners="crisp"]{--r:10px}
html[data-corners="crisp"] .tabbar{border-radius:18px 18px 0 0}
html[data-corners="crisp"] .gradbar,html[data-corners="crisp"] .gradbar i{border-radius:4px}
/* depth */
html[data-depth="lifted"]{--shadow:0 22px 48px rgba(150,130,200,.3)}
html[data-depth="flat"]{--shadow:0 1px 2px rgba(150,130,200,.12)}
/* density */
html[data-density="compact"] main{padding:76px 14px 120px}
html[data-density="compact"] .card{padding:12px 13px;margin-top:10px}
html[data-density="compact"] .tiles{gap:9px;margin-top:10px}
html[data-density="compact"] .tile{padding:13px 12px}
html[data-density="compact"] .xrow{padding:10px 12px;margin-top:8px}
html[data-density="compact"] h2.title{font-size:24px}
html[data-density="compact"] .rate{margin-top:13px}
/* gauge accent intensity */
html[data-glow="on"] .hero .gauge{filter:drop-shadow(0 6px 16px rgba(185,138,224,.45))}
html[data-glow="on"] .tabbar .fab .fabic{box-shadow:0 10px 26px rgba(238,122,168,.6)}

header{position:fixed;top:0;left:0;right:0;z-index:40;background:rgba(252,250,255,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(150,130,200,.14)}
.head-row{max-width:880px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.mark{width:34px;height:34px;border-radius:11px;flex:none;background:conic-gradient(from 210deg,#F6C76B,#EE7AA8,#B98AE0,#7FA9E6,#F6C76B);display:grid;place-items:center;color:#fff;font-weight:700;font-size:16px;box-shadow:0 6px 14px rgba(180,140,210,.35)}
.brand h1{font-weight:600;font-size:15px;margin:0;letter-spacing:-.01em;white-space:nowrap}
.brand p{margin:0;font-size:10.5px;color:var(--muted)}
.hchips{display:flex;gap:7px;flex:none}
.hchip{background:rgba(255,255,255,.66);border:1px solid var(--line-soft);border-radius:13px;padding:5px 10px;text-align:center;min-width:42px}
.hchip b{display:block;font-weight:700;font-size:14px;color:var(--pink);line-height:1.1;font-variant-numeric:tabular-nums}
.hchip span{font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}

main{width:100%;max-width:880px;margin:0 auto;padding:82px 18px 128px;height:100dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:600}
h2.title{font-weight:700;font-size:27px;line-height:1.1;letter-spacing:-.02em;margin:5px 0 0}
@media(min-width:560px){h2.title{font-size:32px}}
.sub{color:var(--ink-soft);font-size:14px;margin:7px 0 0;max-width:60ch}

.card{background:var(--paper-2);border:1px solid rgba(255,255,255,.6);border-radius:var(--r);padding:16px 17px;margin-top:14px;box-shadow:var(--shadow);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.card.teal{background:var(--grad-d);color:#fff;border:none}
.card.teal .cs{color:rgba(255,255,255,.9)}
.ct{font-weight:600;font-size:15px}
.cs{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
.cl{font-size:12.5px;font-weight:700;color:var(--ink-soft)}

.hero .herotop{display:flex;align-items:center;justify-content:space-between;gap:12px}
.hero .herolv{font-size:24px;font-weight:800;margin:6px 0 1px;background:linear-gradient(90deg,#E68FB8,#9B8FE0,#7FB0E6);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .herosub{font-size:11.5px;color:var(--muted)}
.hero .gauge{flex:none;margin:-4px -2px -10px 0}
.streakpill{display:inline-flex;align-items:center;gap:6px;margin-top:11px;background:rgba(255,255,255,.6);border:1px solid var(--line-soft);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--ink-soft)}
.streakpill b{color:var(--pink);font-weight:800;font-variant-numeric:tabular-nums}

.gradbar{position:relative;height:14px;border-radius:999px;background:var(--grad);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.4)}
.gradbar.light{margin-top:14px}
.gradbar i{position:absolute;top:0;bottom:0;right:0;background:rgba(255,255,255,.66);border-left:2px solid rgba(255,255,255,.9);transition:width .4s ease}

.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.tile{border:1px solid rgba(255,255,255,.6);border-radius:var(--r);padding:18px 15px;background:var(--paper-2);cursor:pointer;transition:.16s;box-shadow:var(--shadow);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);text-align:center}
.tile:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(150,130,200,.22)}
.tile .ti{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;margin:0 auto 11px}
.tile .ti svg{width:20px;height:20px}
.tile .ti i{font-size:19px;line-height:1}
.tile b{font-size:14px;font-weight:600;display:block}
.tile span{font-size:11px;color:var(--muted)}
.p-teal{background:var(--mist);color:var(--violet)}.p-plum{background:var(--plum-soft);color:var(--plum)}.p-olive{background:var(--olive-soft);color:var(--olive)}.p-coral{background:var(--coral-soft);color:#C24B86}

.days{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;margin-top:14px;padding-bottom:3px}
.days::-webkit-scrollbar{display:none}
.day{flex:none;font:inherit;cursor:pointer;font-size:12px;font-weight:500;padding:8px 13px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.62);color:var(--ink-soft);white-space:nowrap}
.day[aria-current="true"]{background:var(--grad-d);color:#fff;border-color:transparent}
.day[data-today="true"]:not([aria-current="true"]){border-color:var(--violet);color:var(--violet);font-weight:700}

.xrow{display:flex;align-items:center;gap:11px;padding:13px 14px;border:1px solid rgba(255,255,255,.6);border-radius:16px;margin-top:11px;background:var(--paper-2);cursor:pointer;transition:.15s;box-shadow:var(--shadow);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.xrow:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(150,130,200,.2)}
.xrow.done{background:rgba(244,241,250,.5);border-color:var(--line-soft);box-shadow:none}
.xrow.done:hover{transform:none;box-shadow:none}
.xrow.done .xi{filter:grayscale(1);opacity:.45}
.xrow.done .xt b{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(150,130,200,.45)}
.xrow.done .xt span{opacity:.6}
.xrow .xi{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:16px;flex:none}
.xrow .xt{flex:1;min-width:0}
.xrow .xt b{font-size:14px;font-weight:600;display:block}
.xrow .xt span{font-size:11px;color:var(--muted)}
.xrow .meta{text-align:right;flex:none}
.xrow .star{font-size:12px;color:var(--pink);font-weight:700;font-variant-numeric:tabular-nums}
.xrow .chk{width:30px;height:30px;border-radius:50%;background:var(--grad-d);color:#fff;display:grid;place-items:center;font-size:13px;box-shadow:0 3px 9px rgba(185,138,224,.45)}
.grouplab{font-weight:600;font-size:14px;margin:20px 0 2px;display:flex;align-items:center;gap:8px}
.grouplab .tag{font-size:9px;font-weight:700;background:var(--coral-soft);color:#C24B86;padding:2px 8px;border-radius:7px;text-transform:uppercase;letter-spacing:.05em}

.btn{font:inherit;font-weight:600;font-size:14px;cursor:pointer;padding:12px 18px;border-radius:14px;border:none;background:var(--grad-d);color:#fff;transition:.15s;box-shadow:0 8px 18px rgba(200,120,180,.3)}
.btn:hover{filter:brightness(1.04);transform:translateY(-1px)}
.btn.ghost{background:rgba(255,255,255,.7);color:var(--teal);border:1px solid var(--line);box-shadow:none}
.btn.sm{padding:8px 14px;font-size:12.5px;border-radius:11px}
.btn:disabled{opacity:.45;cursor:default;box-shadow:none}
.btn.full{width:100%;text-align:center}
.backbtn{font:inherit;font-weight:500;font-size:13px;cursor:pointer;background:none;border:none;color:var(--teal);padding:0;margin-bottom:6px;display:inline-flex;align-items:center;gap:6px}

input[type=text],textarea{font:inherit;width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.85);color:var(--ink)}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(185,138,224,.2)}
label.fld{font-size:11px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
.lead{font-size:14px;color:var(--ink-soft);margin:8px 0 12px}
.ex{font-size:12px;background:var(--mist);border-radius:8px;padding:2px 8px;color:var(--violet);font-weight:600}
ul.clean{list-style:none;padding:0;margin:10px 0 0;display:grid;gap:7px}
ul.clean li{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;background:rgba(255,255,255,.55);border:1px solid var(--line-soft);border-radius:11px;padding:10px 12px}
ul.clean li .d{width:6px;height:6px;border-radius:50%;background:var(--pink);margin-top:7px;flex:none}
.clean.numbered li{align-items:center}
.clean.numbered li .num{width:23px;height:23px;border-radius:7px;background:var(--grad-d);color:#fff;font-weight:800;font-size:11px;display:grid;place-items:center;flex:none;font-variant-numeric:tabular-nums}
.note{font-size:12px;color:var(--ink-soft);margin-top:11px;display:flex;gap:8px;align-items:flex-start}
.note .d{width:6px;height:6px;border-radius:50%;background:var(--pink);margin-top:6px;flex:none}

.gamebox{background:rgba(255,255,255,.55);border:1px solid var(--line-soft);border-radius:16px;padding:16px;margin-top:13px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.clock{font-weight:700;font-size:30px;background:var(--mist);border-radius:13px;padding:6px 16px;text-align:center;min-width:96px;font-variant-numeric:tabular-nums}
.clock.run{color:var(--pink)}
.mtimer{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.count-big{font-weight:700;font-size:30px;color:var(--violet);font-variant-numeric:tabular-nums}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;min-height:6px}
.chip{background:var(--coral-soft);color:#C24B86;font-size:12px;font-weight:600;padding:4px 11px;border-radius:999px;animation:pop .2s ease}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.best{font-size:12px;color:var(--ink-soft);margin-top:10px;font-variant-numeric:tabular-nums}.best b{color:var(--pink)}
.tw-text{font-weight:600;font-size:18px;line-height:1.3}
.dots{display:flex;gap:5px}.dot{width:9px;height:9px;border-radius:50%;background:var(--line)}.dot.on{background:var(--pink)}
.twister{background:rgba(255,255,255,.6);border:1px solid var(--line-soft);border-radius:14px;padding:14px;margin-top:10px}
.vup{background:linear-gradient(180deg,rgba(255,255,255,.85),var(--plum-soft));border:1px solid rgba(150,130,200,.2);border-radius:14px;padding:14px;margin-top:10px}
.vup .from{font-weight:700;font-size:19px;color:var(--plum)}.vup .arrow{color:var(--plum);margin:0 8px;font-weight:700}
.shade-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.shade-btn{font:inherit;font-weight:500;font-size:12px;cursor:pointer;padding:6px 12px;border-radius:999px;border:1px solid rgba(150,130,200,.3);background:rgba(255,255,255,.8);color:var(--plum)}
.shade-btn.on{background:var(--plum);color:#fff;border-color:transparent}
.tier{margin-top:10px}.tier-lab{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--plum);margin-bottom:5px;letter-spacing:.05em}.tier-lab .lv{background:var(--plum);color:#fff;border-radius:5px;padding:2px 7px;font-size:9px}.tier-lab .lv.stretch{background:var(--pink)}
.reveal{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.ptag{background:rgba(255,255,255,.85);border:1px solid rgba(150,130,200,.3);color:var(--plum);font-weight:600;font-size:13px;padding:5px 11px;border-radius:9px;cursor:pointer}
.ptag:hover{background:var(--plum);color:#fff}
.ladder{display:flex;flex-direction:column-reverse;gap:7px;margin-top:10px}
.rung{border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.7);overflow:hidden}
.rung summary{cursor:pointer;list-style:none;padding:12px 13px;font-weight:500;font-size:13.5px;display:flex;gap:10px;align-items:center}
.rung summary::-webkit-details-marker{display:none}
.rung .step{width:23px;height:23px;border-radius:7px;background:var(--mist);color:var(--violet);font-weight:700;font-size:11px;display:grid;place-items:center;flex:none}
.rung[open]{border-color:var(--violet)}.rung[open] .step{background:var(--grad-d);color:#fff}
.rung .detail{padding:0 13px 12px 46px;font-size:13px;color:var(--ink-soft)}
.fm-grid{display:grid;gap:9px;margin-top:10px}
.fm-box label{font-size:11px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px}
.fm-box .hint{color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0;font-size:10.5px}
.rec{background:rgba(255,255,255,.5);border:1px dashed var(--violet);border-radius:14px;padding:14px;margin-top:11px;text-align:center}
.rec .opt{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--pink);font-weight:700}
.rec-dot{width:10px;height:10px;border-radius:50%;background:#e0608f;display:inline-block;margin-right:7px}
.rec-dot.live{animation:blink 1s infinite}@keyframes blink{50%{opacity:.25}}
audio{width:100%;margin-top:10px}

.bigword{font-weight:700;font-size:34px;background:linear-gradient(90deg,#E68FB8,#9B8FE0,#7FB0E6);-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center;letter-spacing:-.02em;margin:6px 0}
.scorebar{display:flex;gap:7px;margin-top:10px}
.sc-b{flex:1;font:inherit;font-weight:600;font-size:13px;cursor:pointer;padding:10px;border-radius:11px;border:1px solid var(--line);background:rgba(255,255,255,.8);color:var(--ink-soft);text-align:center}
.sc-b.on{background:var(--grad-d);color:#fff;border-color:transparent}
.moderow{display:flex;gap:7px;margin-top:11px}
.modeb{flex:1;font:inherit;font-weight:600;font-size:12.5px;cursor:pointer;padding:9px;border-radius:11px;border:1px solid var(--line);background:rgba(255,255,255,.8);color:var(--ink-soft)}
.modeb.on{background:var(--grad-d);color:#fff;border-color:transparent}
.catpills{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
input[type=number]{font:inherit;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.85);color:var(--ink);font-weight:700;font-size:18px}
input[type=number]:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(185,138,224,.2)}

.togs{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:14px}
.tog{background:var(--paper-2);border:1px solid rgba(255,255,255,.6);border-radius:15px;padding:14px 8px;text-align:center;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
.tog .ic{width:32px;height:32px;border-radius:50%;margin:0 auto 7px;display:grid;place-items:center;font-size:14px;transition:.15s}
.tog .ic svg{width:19px;height:19px}
.tog .ic i{font-size:14px}
.tog.on .ic{background:var(--grad-d);color:#fff}.tog.off .ic{background:var(--mist);color:var(--muted)}
.tog b{font-size:12px;display:block;font-weight:600}.tog span{font-size:9.5px;color:var(--muted)}
.rate{margin-top:18px}
.rate .rl{font-size:11.5px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.04em;display:block}
.rl-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.rval{font-size:13.5px;font-weight:800;font-variant-numeric:tabular-nums}
.slider{-webkit-appearance:none;appearance:none;width:100%;height:10px;border-radius:999px;background:var(--track);outline:none;margin-top:11px;cursor:pointer}
.slider.unset{opacity:.45;filter:grayscale(.4)}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--c,#fff);border:4px solid #fff;box-shadow:0 2px 8px rgba(120,90,170,.45);cursor:pointer}
.slider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--c,#fff);border:4px solid #fff;box-shadow:0 2px 8px rgba(120,90,170,.45);cursor:pointer}
.slider.unset::-webkit-slider-thumb{background:#fff;border:4px solid #C3B7E0}
.slider.unset::-moz-range-thumb{background:#fff;border:4px solid #C3B7E0}
.ticks{display:flex;margin-top:8px}
.ticks span{font-size:10px;color:var(--muted);font-weight:600;flex:1;text-align:center}
.ticks span:first-child{text-align:left}.ticks span:last-child{text-align:right}
.ticks span.on{font-weight:800}
.rate-row{display:flex;gap:7px;margin-top:9px}
.rb{font:inherit;font-weight:600;font-size:12.5px;cursor:pointer;padding:11px 6px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.8);color:var(--ink-soft);flex:1;text-align:center;transition:.13s}
.rb:hover{border-color:var(--violet)}
.rb.on{color:#fff;border-color:transparent}

function weekParity(d){const ref=new Date(2024,0,7);const day0=new Date(d.getFullYear(),d.getMonth(),d.getDate());const weeks=Math.floor(Math.round((day0-ref)/86400000)/7);return ((weeks%2)+2)%2;}

function dailySampleGame(ctx){const prompts=["What did I do today?","Explain the last show I watched.","Describe a recipe.","Explain a work project in plain language.","Describe your neighborhood to a visitor.","Tell the story of a memorable trip.","Explain how to get from home to a place you know well.","Talk about your plans for the week."];const pr=randomMode?drawItem('sample',prompts):prompts[new Date().getDate()%prompts.length];const w=document.createElement('div');w.className='gamebox';w.innerHTML='<p class="lead">Hit record to start a 60-second timer, then answer the prompt out loud. It stops on its own when time is up. Then self-score. <b>This is data, not a performance review.</b></p><div class="twister"><div style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase">Prompt</div><div class="tw-text" style="font-size:16px;margin-top:4px">“'+pr+'”</div></div>';const rec=document.createElement('div');rec.className='rec';rec.innerHTML='<div class="opt">Recording</div><div style="display:flex;align-items:center;gap:12px;margin-top:9px"><button class="btn recbtn"><span class="rec-dot"></span>Start recording</button><span class="clock" style="font-family:Nunito;font-weight:800">1:00</span></div><div class="player" style="margin-top:10px"></div><div style="font-size:11px;color:var(--ink-soft);margin-top:8px" class="rn"></div>';const btn=rec.querySelector('.recbtn'),player=rec.querySelector('.player'),rn=rec.querySelector('.rn'),dot=rec.querySelector('.rec-dot'),clk=rec.querySelector('.clock');let mr=null,ch=[],on=false,iv=null,t=60;function pickMime(){const opts=['audio/webm','audio/mp4','audio/aac','audio/ogg'];for(let i=0;i<opts.length;i++){if(window.MediaRecorder&&MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(opts[i]))return opts[i];}return '';}function stopTimer(){if(iv){clearInterval(iv);iv=null;}t=60;clk.textContent='1:00';}btn.addEventListener('click',async function(){if(on){if(mr&&mr.state!=='inactive')mr.stop();return;}try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});const mime=pickMime();mr=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);ch=[];mr.ondataavailable=function(e){if(e.data&&e.data.size)ch.push(e.data);};mr.onstop=function(){stopTimer();const blob=new Blob(ch,{type:(mr&&mr.mimeType)||mime||'audio/webm'});const u=URL.createObjectURL(blob);player.innerHTML='<audio controls preload="auto" src="'+u+'"></audio>';stream.getTracks().forEach(function(x){x.stop();});on=false;dot.classList.remove('live');btn.innerHTML='<span class="rec-dot"></span>Record again';rn.textContent='Playback is for this session only — recordings are not saved.';};mr.start();on=true;dot.classList.add('live');btn.innerHTML='<span class="rec-dot live"></span>Stop';t=60;clk.textContent='1:00';iv=setInterval(function(){t--;clk.textContent='0:'+String(Math.max(0,t)).padStart(2,'0');if(t<=0){if(mr&&mr.state!=='inactive')mr.stop();}},1000);}catch(e){rn.textContent='Mic unavailable here — open the app from your home screen, or just speak aloud while you self-score.';}});w.appendChild(rec);const sc=document.createElement('div');sc.style.marginTop='12px';sc.innerHTML='<label class="fld">Self-score — how did that feel? (1 = stopped / struggled, 5 = clear &amp; easy)</label><div class="scorebar"></div>';const bar=sc.querySelector('.scorebar');[1,2,3,4,5].forEach(function(v){const b=document.createElement('button');b.className='sc-b';b.textContent=v;if((DB.sampleScores||{})[todayKey()]===v)b.classList.add('on');b.addEventListener('click',function(){bar.querySelectorAll('.sc-b').forEach(function(x){x.classList.remove('on');});b.classList.add('on');DB.sampleScores=DB.sampleScores||{};DB.sampleScores[todayKey()]=v;save();});bar.appendChild(b);});w.appendChild(sc);return w;}

function nbackGame(ctx){
  const w=document.createElement('div');w.className='gamebox';
  w.innerHTML='<p class="lead">Working-memory training. A word appears every couple of seconds. Tap <b>Match</b> whenever the current word is the same as the one <b>N steps back</b>. Say each word aloud as it appears.</p>'+
   '<div class="moderow nlevel"><button class="modeb" data-n="1">1-back</button><button class="modeb on" data-n="2">2-back</button><button class="modeb" data-n="3">3-back</button></div>'+
   '<div style="text-align:center;margin:14px 0;min-height:74px;display:flex;align-items:center;justify-content:center;background:var(--coral-soft);border-radius:16px"><div class="nbword" style="font-family:Nunito;font-weight:800;font-size:30px;color:var(--coral)">–</div></div>'+
   '<div style="display:flex;gap:8px;justify-content:center"><button class="btn sm nbstart">Start</button><button class="btn ghost sm nbmatch" disabled>Match ✓</button></div>'+
   '<div class="best">Best accuracy: <b class="nbbest">'+(DB.bestNback||0)+'%</b></div>'+
   '<div class="note"><span class="d"></span><span class="nbmsg">Pick a level, then Start.</span></div>';
  let N=2;const lvlBtns=w.querySelectorAll('.nlevel .modeb');
  const wordEl=w.querySelector('.nbword'),startB=w.querySelector('.nbstart'),matchB=w.querySelector('.nbmatch'),msg=w.querySelector('.nbmsg'),bestEl=w.querySelector('.nbbest');
  let seq=[],pos=-1,iv=null,running=false,hits=0,fa=0,totalTargets=0,responded=false;const LEN=22;
  lvlBtns.forEach(function(b){b.addEventListener('click',function(){if(running)return;N=+b.dataset.n;lvlBtns.forEach(function(x){x.classList.toggle('on',x===b);});});});
  function buildSeq(){seq=[];for(let i=0;i<LEN;i++){let pick;if(i>=N&&Math.random()<0.34){pick=seq[i-N];}else{pick=NBACK_WORDS[Math.floor(Math.random()*NBACK_WORDS.length)];if(i>=N&&pick===seq[i-N]){pick=NBACK_WORDS[(NBACK_WORDS.indexOf(pick)+1)%NBACK_WORDS.length];}}seq.push(pick);}totalTargets=0;for(let i=N;i<LEN;i++){if(seq[i]===seq[i-N])totalTargets++;}}
  function endGame(){clearInterval(iv);running=false;matchB.disabled=true;startB.disabled=false;startB.textContent='Play again';wordEl.textContent='✓';wordEl.style.color='var(--olive)';const acc=totalTargets?Math.round(hits/totalTargets*100):100;msg.innerHTML='Targets: '+totalTargets+' · Caught: '+hits+' · Missed: '+Math.max(0,totalTargets-hits)+' · False taps: '+fa+' — <b>'+acc+'% caught</b>';if(totalTargets>0&&acc>(DB.bestNback||0)){DB.bestNback=acc;bestEl.textContent=acc+'%';save();}}
  function step(){pos++;if(pos>=LEN){endGame();return;}responded=false;wordEl.style.color='var(--coral)';wordEl.textContent=seq[pos];}
  matchB.addEventListener('click',function(){if(!running||responded||pos<0)return;responded=true;if(pos>=N&&seq[pos]===seq[pos-N]){hits++;wordEl.style.color='var(--olive)';}else{fa++;wordEl.style.color='var(--muted)';}});
  startB.addEventListener('click',function(){if(running)return;buildSeq();pos=-1;hits=0;fa=0;running=true;startB.disabled=true;matchB.disabled=false;msg.textContent='Watch for words that repeat '+N+' back…';step();iv=setInterval(step,2400);});
  return w;
}

  shown.forEach(cat=>{const ids=Object.keys(EX).filter(id=>EX[id].cat===cat);if(!ids.length)return;const lab=document.createElement('div');lab.className='grouplab';lab.innerHTML=cat+(cat==='Word retrieval'?' <span class="tag">Featured</span>':'');main.appendChild(lab);ids.forEach(id=>{const e=EX[id];const row=document.createElement('div');row.className='xrow';row.innerHTML='<div class="xi '+e.ic+'">'+e.icon+'</div><div class="xt"><b>'+e.name+'</b><span>'+e.blurb+'</span></div><div class="meta"><div class="star">+'+e.pts+'</div></div>';row.addEventListener('click',()=>openExercise(id,DAYS[Math.floor(Math.random()*DAYS.length)],false,planDay));main.appendChild(row);});});
  if(keepScroll)main.scrollTop=_sc;else main.scrollTo({top:0,behavior:'smooth'});
}

/* ===== analytics ===== */
function avgWhere(field,val,metric){let s=0,n=0;for(const key in DB.logs){const L=DB.logs[key];if(L[field]===val&&L[metric]){s+=L[metric];n++;}}return n>=2?{avg:s/n,n:n}:null;}
function ratingFor(L){if(!L)return 0;if(calMetric==='mem')return L.mem||0;if(calMetric==='speech')return L.speech||0;if(calMetric==='anx')return L.anx||0;const a=L.mem||0,b=L.speech||0;if(!a&&!b)return 0;if(!a)return b;if(!b)return a;return Math.round((a+b)/2);}
function monthGridEl(year,month,small){const wrap=document.createElement('div');const first=new Date(year,month,1),startDow=first.getDay(),days=new Date(year,month+1,0).getDate();if(!small){const wk=document.createElement('div');wk.className='wk';['S','M','T','W','T','F','S'].forEach(x=>{const s=document.createElement('span');s.textContent=x;wk.appendChild(s);});wrap.appendChild(wk);}const grid=document.createElement('div');grid.className='grid7';for(let i=0;i<startDow;i++){const e=document.createElement('div');e.className='cell empty';grid.appendChild(e);}for(let dd=1;dd<=days;dd++){const key=year+'-'+String(month+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');const L=getLog(key);const r=ratingFor(L);const cell=document.createElement('div');cell.className='cell'+(r>=3?' dark':'')+(key===todayKey()?' today':'');cell.style.background=RCOL[r];if(!small)cell.textContent=dd;if(DB.exDiff[key]&&DB.exDiff[key].length){const dot=document.createElement('span');dot.className='exdot';cell.appendChild(dot);}cell.addEventListener('click',()=>{selDate=key;go('log');});grid.appendChild(cell);}wrap.appendChild(grid);return wrap;}
function barsEl(values,labels,color){const c=document.createElement('div');c.className='bars';const max=Math.max(1,...values);values.forEach((v,i)=>{const col=document.createElement('div');col.className='col';const bar=document.createElement('i');bar.style.height=(v/max*100)+'%';if(color)bar.style.background=color;const xl=document.createElement('span');xl.className='xl';xl.textContent=labels[i]||'';col.appendChild(bar);col.appendChild(xl);c.appendChild(col);});return c;}

function renderWords(){
  backAction=function(){go('stats');};main.innerHTML='';
  const back=document.createElement('button');back.className='backbtn';back.innerHTML='‹ Back';back.addEventListener('click',function(){go('stats');});main.appendChild(back);
  main.appendChild(header('Vocabulary','Saved words','Words you have banked from Word Upgrade — your stronger alternatives, A–Z. Tap × to remove one.'));
  const items=collItems().slice().sort(function(a,b){return a.w.toLowerCase().localeCompare(b.w.toLowerCase());});
  if(!items.length){const e=document.createElement('div');e.className='card';e.innerHTML='<div class="cs">No saved words yet. In <b>Word Upgrade</b>, tap any stronger word to save it here.</div>';main.appendChild(e);main.scrollTo({top:0});return;}
  const list=document.createElement('div');list.className='wordlist';
  items.forEach(function(it){const r=document.createElement('div');r.className='wordrow';r.innerHTML='<div class="wpair">'+(it.b?'<span class="wbase">'+it.b+'</span><span class="warrow">→</span>':'')+'<span class="wup">'+it.w+'</span></div><button class="wdel" aria-label="Remove">×</button>';r.querySelector('.wdel').addEventListener('click',function(){removeColl(it.w);renderWords();});list.appendChild(r);});
  main.appendChild(list);main.scrollTo({top:0,behavior:'smooth'});
}
function renderStats(keepScroll){backAction=function(){go('home');};var _sc=keepScroll?main.scrollTop:0;
  main.innerHTML='';
  main.appendChild(header('Progress','Your patterns','Trends, correlations, and plain-language insights — from both your exercises and your daily log.'));
  // insights
  const insights=[];
  const proteinSpeech=[avgWhere('protein',true,'speech'),avgWhere('protein',false,'speech')];
  if(proteinSpeech[0]&&proteinSpeech[1]&&Math.abs(proteinSpeech[0].avg-proteinSpeech[1].avg)>=0.4){const hi=proteinSpeech[0].avg>proteinSpeech[1].avg;insights.push('Your speech averaged <b>'+proteinSpeech[0].avg.toFixed(1)+'</b> on protein days vs <b>'+proteinSpeech[1].avg.toFixed(1)+'</b> without — '+(hi?'protein days look sharper.':'an unexpected pattern worth watching.'));}
  const sedSpeech=[avgWhere('sedative',true,'speech'),avgWhere('sedative',false,'speech')];
  if(sedSpeech[0]&&sedSpeech[1]&&Math.abs(sedSpeech[0].avg-sedSpeech[1].avg)>=0.4){const worse=sedSpeech[0].avg<sedSpeech[1].avg;insights.push('After a sedative night, speech averaged <b>'+sedSpeech[0].avg.toFixed(1)+'</b> vs <b>'+sedSpeech[1].avg.toFixed(1)+'</b> otherwise'+(worse?' — sedatives may be costing you the next day.':'.'));}
  const sedAnx=[avgWhere('sedative',true,'anx'),avgWhere('sedative',false,'anx')];
  if(sedAnx[0]&&sedAnx[1]&&Math.abs(sedAnx[0].avg-sedAnx[1].avg)>=0.4){insights.push('Anxiety averaged <b>'+sedAnx[0].avg.toFixed(1)+'</b> after sedative nights vs <b>'+sedAnx[1].avg.toFixed(1)+'</b> otherwise.');}
  if(insights.length){insights.forEach(t=>{const c=document.createElement('div');c.className='insight';c.innerHTML='<b>Pattern:</b> '+t;main.appendChild(c);});}
  else{const c=document.createElement('div');c.className='insight';c.innerHTML='<b>Keep logging.</b> Once you have several days of check-ins and trackers, patterns appear here automatically — like whether protein days or sedative nights move your scores.';main.appendChild(c);}

  // trends — last 14 days speech & memory
  const labels=[],sp=[],me=[],act=[];const td=new Date();
  for(let i=13;i>=0;i--){const d=new Date(td);d.setDate(td.getDate()-i);const key=k(d);const L=getLog(key);labels.push(i%2===0?String(d.getDate()):'');sp.push(L?L.speech:0);me.push(L?L.mem:0);act.push(DB.exDiff[key]?DB.exDiff[key].length:0);}
  const tc1=document.createElement('div');tc1.className='chartcard';tc1.innerHTML='<div class="ct2"><span>Speech · last 14 days</span><span>1–4</span></div>';tc1.appendChild(barsEl(sp,labels,'var(--teal)'));main.appendChild(tc1);
  const tc2=document.createElement('div');tc2.className='chartcard';tc2.innerHTML='<div class="ct2"><span>Memory · last 14 days</span><span>1–4</span></div>';tc2.appendChild(barsEl(me,labels,'var(--plum)'));main.appendChild(tc2);
  const tc3=document.createElement('div');tc3.className='chartcard';tc3.innerHTML='<div class="ct2"><span>Exercises done · last 14 days</span><span>count</span></div>';tc3.appendChild(barsEl(act,labels,'var(--coral)'));main.appendChild(tc3);

  // correlation cards
  function corrCard(title,a,b,la,lb){const c=document.createElement('div');c.className='chartcard';c.innerHTML='<div class="ct2"><span>'+title+'</span></div><div class="corr"><div class="pair"><b>'+(a?a.avg.toFixed(1):'—')+'</b><span>'+la+(a?' ('+a.n+'d)':'')+'</span></div><div class="pair"><b>'+(b?b.avg.toFixed(1):'—')+'</b><span>'+lb+(b?' ('+b.n+'d)':'')+'</span></div></div>';return c;}
  main.appendChild(corrCard('Speech: protein vs not',proteinSpeech[0],proteinSpeech[1],'protein','no protein'));
  main.appendChild(corrCard('Speech: after sedative vs not',sedSpeech[0],sedSpeech[1],'sedative','none'));

  // heatmap
  const hl=document.createElement('div');hl.className='grouplab';hl.textContent='Calendar';main.appendChild(hl);
  const bar=document.createElement('div');bar.className='calbar';bar.innerHTML='<div class="seg"><button class="vM" aria-pressed="'+(calView==='month')+'">Month</button><button class="vQ" aria-pressed="'+(calView==='quarter')+'">Quarter</button></div><div class="seg"><button class="kMem" aria-pressed="'+(calMetric==='mem')+'">Memory</button><button class="kSpe" aria-pressed="'+(calMetric==='speech')+'">Speech</button><button class="kAnx" aria-pressed="'+(calMetric==='anx')+'">Anxiety</button><button class="kB" aria-pressed="'+(calMetric==='both')+'">All</button></div>';main.appendChild(bar);
  bar.querySelector('.vM').onclick=()=>{calView='month';renderStats(true);};bar.querySelector('.vQ').onclick=()=>{calView='quarter';renderStats(true);};
  bar.querySelector('.kMem').onclick=()=>{calMetric='mem';renderStats(true);};bar.querySelector('.kSpe').onclick=()=>{calMetric='speech';renderStats(true);};bar.querySelector('.kAnx').onclick=()=>{calMetric='anx';renderStats(true);};bar.querySelector('.kB').onclick=()=>{calMetric='both';renderStats(true);};
  const nav=document.createElement('div');nav.className='calbar';const y=calDate.getFullYear(),m=calDate.getMonth();
  const cal=document.createElement('div');cal.className='chartcard';
  if(calView==='month'){nav.innerHTML='<button class="navbtn p">‹</button><div class="callabel">'+MONTHS[m]+' '+y+'</div><button class="navbtn n">›</button>';cal.appendChild(monthGridEl(y,m,false));nav.querySelector('.p').onclick=()=>{calDate=new Date(y,m-1,1);renderStats(true);};nav.querySelector('.n').onclick=()=>{calDate=new Date(y,m+1,1);renderStats(true);};}
  else{const qs=Math.floor(m/3)*3;nav.innerHTML='<button class="navbtn p">‹</button><div class="callabel">'+MONTHS[qs].slice(0,3)+'–'+MONTHS[qs+2].slice(0,3)+' '+y+'</div><button class="navbtn n">›</button>';for(let i=0;i<3;i++){const mm=qs+i;const qm=document.createElement('div');qm.className='qmonth';qm.innerHTML='<div class="qm-lab">'+MONTHS[mm]+'</div>';qm.appendChild(monthGridEl(y,mm,true));cal.appendChild(qm);}nav.querySelector('.p').onclick=()=>{calDate=new Date(y,qs-3,1);renderStats(true);};nav.querySelector('.n').onclick=()=>{calDate=new Date(y,qs+3,1);renderStats(true);};}
  main.appendChild(nav);main.appendChild(cal);
  const leg=document.createElement('div');leg.className='legend';leg.innerHTML='<span><span class="sw" style="background:'+RCOL[1]+'"></span>low</span><span><span class="sw" style="background:'+RCOL[2]+'"></span>okay</span><span><span class="sw" style="background:'+RCOL[3]+'"></span>good</span><span><span class="sw" style="background:'+RCOL[4]+'"></span>high</span><span><span class="exdot" style="position:static;display:inline-block;margin-right:4px"></span>exercise done</span>';main.appendChild(leg);

  {const items=collItems();const hl2=document.createElement('div');hl2.className='grouplab';hl2.textContent='Saved words';main.appendChild(hl2);const card=document.createElement('div');card.className='chartcard';card.style.cursor='pointer';if(items.length){const prev=items.slice().sort(function(a,b){return a.w.toLowerCase().localeCompare(b.w.toLowerCase());}).slice(0,12);card.innerHTML='<div class="ct2"><span>'+items.length+' saved</span><span>See all &amp; edit ›</span></div>';const g=document.createElement('div');g.className='collgrid';g.style.marginTop='10px';prev.forEach(function(it){const t=document.createElement('span');t.className='collword';t.textContent=it.b?(it.b+' → '+it.w):it.w;g.appendChild(t);});card.appendChild(g);}else{card.innerHTML='<div class="cs">No saved words yet. In <b>Word Upgrade</b>, tap a stronger word to bank it here.</div>';}card.addEventListener('click',function(){renderWords();});main.appendChild(card);}

  // ===== data backup: export / import =====
  const dl=document.createElement('div');dl.className='grouplab';dl.textContent='Your data';main.appendChild(dl);
  const dcard=document.createElement('div');dcard.className='chartcard';
  dcard.innerHTML='<div class="cs" style="margin-bottom:12px">Your progress saves automatically on this device. Export a backup to keep it safe, or to move it to another phone or browser. Importing replaces the data on this device.</div>';
  const drow=document.createElement('div');drow.style.cssText='display:flex;gap:9px;flex-wrap:wrap';
  const expBtn=document.createElement('button');expBtn.className='btn sm';expBtn.innerHTML='<i class="fa-solid fa-download"></i>&nbsp; Export backup';
  const impBtn=document.createElement('button');impBtn.className='btn sm ghost';impBtn.innerHTML='<i class="fa-solid fa-upload"></i>&nbsp; Import backup';
  const fileInp=document.createElement('input');fileInp.type='file';fileInp.accept='application/json,.json';fileInp.style.display='none';
  const msg=document.createElement('div');msg.className='cs';msg.style.marginTop='11px';
  if(pendingDataMsg){msg.textContent=pendingDataMsg.text;msg.style.color=pendingDataMsg.ok?'var(--olive)':'var(--coral)';msg.style.fontWeight='700';pendingDataMsg=null;}
  expBtn.addEventListener('click',function(){var ok=exportData();msg.textContent=ok?'Backup downloaded to your device.':'Export failed — please try again.';msg.style.color=ok?'var(--olive)':'var(--coral)';msg.style.fontWeight='700';});
  impBtn.addEventListener('click',function(){fileInp.click();});
  fileInp.addEventListener('change',function(){var f=fileInp.files&&fileInp.files[0];if(!f)return;var proceed=(typeof confirm==='function')?confirm('Import this backup? It will replace the points, logs and progress currently on this device.'):true;if(!proceed){fileInp.value='';return;}importData(f,function(ok,m){fileInp.value='';if(ok){pendingDataMsg={ok:true,text:m};renderStats();}else{msg.textContent=m;msg.style.color='var(--coral)';msg.style.fontWeight='700';}});});
  drow.appendChild(expBtn);drow.appendChild(impBtn);dcard.appendChild(drow);dcard.appendChild(fileInp);dcard.appendChild(msg);main.appendChild(dcard);

  if(keepScroll)main.scrollTop=_sc;else main.scrollTo({top:0,behavior:'smooth'});
}

/* ================= NAV ================= */
const tabbar=document.getElementById('tabbar');
function go(s){section=s;[...tabbar.children].forEach(b=>b.setAttribute('aria-current',b.dataset.s===s));var _st=document.getElementById('subtitle');if(_st)_st.textContent={home:'Daily practice',plan:'Sessions',games:'Mini-Games',log:'Daily Log',stats:'Progress'}[s];if(s==='home')renderHome();else if(s==='plan')renderPlan();else if(s==='games')renderGames();else if(s==='log'){selDate=todayKey();renderLog();}else renderStats();}
[...tabbar.children].forEach(b=>b.addEventListener('click',()=>go(b.dataset.s)));

updateHeader();renderHome();
  }
}
